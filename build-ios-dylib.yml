name: build-ios-dylib

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Build dylib
        run: |
          xcrun --sdk iphoneos clang++ -arch arm64 -dynamiclib \
            -isysroot "$(xcrun --sdk iphoneos --show-sdk-path)" \
            -miphoneos-version-min=12.0 \
            -framework Foundation -framework UIKit \
            -fobjc-arc SVXnbRedirectPlugin.mm fishhook.c \
            -o SVXnbRedirectPlugin.dylib
          file SVXnbRedirectPlugin.dylib

      - name: Package
        run: |
          mkdir -p dist
          cp SVXnbRedirectPlugin.dylib dist/
          cp README.md dist/
          zip -r SVXnbRedirectPlugin-dylib.zip dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SVXnbRedirectPlugin-dylib
          path: SVXnbRedirectPlugin-dylib.zip
